name: CI/CD Pipeline com CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════
  # JOB 1: Análise de Segurança com CodeQL
  # ═══════════════════════════════════════════
  codeql-analysis:
    name: '🔒 Análise CodeQL'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          config-file: ./.github/codeql-config.yml

      - name: Executar análise CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          output: sarif-results

      - name: Bloquear pipeline se CodeQL encontrar vulnerabilidades
        run: |
          python - <<'PY'
          import glob
          import json
          import sys

          sarif_files = glob.glob("sarif-results/**/*.sarif", recursive=True)
          if not sarif_files:
            print("::error::Nenhum arquivo SARIF foi gerado pelo CodeQL.")
            sys.exit(1)

          total_results = 0
          for file_path in sarif_files:
            with open(file_path, "r", encoding="utf-8") as sarif_file:
              data = json.load(sarif_file)
            for run in data.get("runs", []):
              total_results += len(run.get("results", []))

          print(f"Achados CodeQL: {total_results}")
          if total_results > 0:
            print("::error::Vulnerabilidade detectada pelo CodeQL. Pipeline bloqueada.")
            sys.exit(1)

          print("Nenhuma vulnerabilidade detectada pelo CodeQL.")
          PY

  # ═══════════════════════════════════════════
  # JOB 2: Testes Automatizados
  # ═══════════════════════════════════════════
  tests:
    name: '🧪 Testes Automatizados'
    runs-on: ubuntu-latest
    needs: codeql-analysis
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Executar testes
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v

      - name: Verificar qualidade do código
        run: flake8 . --max-line-length=120 --exclude=venv

  # ═══════════════════════════════════════════
  # JOB 3: Deploy para Stage
  # ═══════════════════════════════════════════
  deploy-stage:
    name: '🚀 Deploy para Stage'
    runs-on: ubuntu-latest
    needs: [codeql-analysis, tests]
    environment: stage
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Simular deploy para Stage
        run: |
          echo '✅ Deploy para Stage iniciado'
          echo 'Versão: ${{ github.sha }}'
          echo 'Branch: ${{ github.ref_name }}'
          echo '🚀 Aplicação disponível em stage!'
